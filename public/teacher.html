<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太阳装饰家 - 教师控制台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading -->
  <div id="loader" class="loader">
    <div class="loader-sun"></div>
    <p>加载中...</p>
  </div>

  <div id="teacher-app">
    <div class="teacher-header">
      <h1>太阳装饰家</h1>
      <span class="teacher-badge">教师控制台</span>
    </div>

    <div id="control-bar">
      <!-- Mode switcher -->
      <div class="control-group">
        <label>模式</label>
        <div class="mode-buttons">
          <button class="mode-btn active" data-mode="symmetric">对称装饰</button>
          <button class="mode-btn" data-mode="personify">拟人化</button>
          <button class="mode-btn" data-mode="free">自由模式</button>
        </div>
      </div>

      <!-- Student count -->
      <div class="control-group">
        <label>连接</label>
        <div id="student-count" class="count-display">0 位学生在线</div>
      </div>

      <!-- Lock -->
      <div class="control-group">
        <button id="btn-lock" class="lock-btn">锁定操作</button>
      </div>
    </div>

    <!-- Asset Management Section -->
    <div id="asset-section" class="teacher-section">
      <div class="section-header">
        <h2>素材管理</h2>
        <div class="section-actions">
          <button id="btn-draw-shape" class="action-btn">绘制素材</button>
          <button id="btn-import-shape" class="action-btn">导入点线</button>
          <button id="btn-import-face" class="action-btn accent">导入五官</button>
          <input type="file" id="face-file-input" accept="image/*" style="display:none">
          <input type="file" id="shape-file-input" accept="image/*" style="display:none">
        </div>
      </div>

      <!-- Custom shapes list -->
      <div id="custom-assets-area">
        <div class="asset-group">
          <h3>自定义素材 (点/线)</h3>
          <div id="custom-shapes-grid" class="asset-grid"></div>
          <p id="no-custom-shapes" class="empty-hint">暂无自定义素材，点击"绘制素材"添加</p>
        </div>
        <div class="asset-group">
          <h3>自定义五官</h3>
          <div id="custom-faces-grid" class="asset-grid"></div>
          <p id="no-custom-faces" class="empty-hint">暂无自定义五官，点击"导入五官"添加</p>
        </div>
      </div>
    </div>

    <!-- Shape import modal -->
    <div id="shape-import-modal" class="draw-modal">
      <div class="draw-modal-content" style="max-width:400px">
        <div class="draw-modal-header">
          <h3>导入点线素材</h3>
          <button class="draw-close-btn" id="shape-modal-close">&times;</button>
        </div>
        <div class="draw-body" style="flex-direction:column;align-items:center;gap:16px;padding:20px">
          <div id="shape-preview-area" class="face-preview-area">
            <p>点击选择图片</p>
          </div>
          <div class="draw-field" style="width:100%">
            <label>名称</label>
            <input type="text" id="shape-import-name" class="draw-name-input" placeholder="素材名称" maxlength="10">
          </div>
          <div class="draw-field" style="width:100%">
            <label>分类</label>
            <div class="draw-category-btns">
              <button class="shape-cat-btn active" data-cat="dots">点</button>
              <button class="shape-cat-btn" data-cat="lines">线</button>
            </div>
          </div>
        </div>
        <div class="draw-modal-footer">
          <button class="draw-cancel-btn" id="shape-modal-cancel">取消</button>
          <button class="draw-save-btn" id="shape-modal-save">导入</button>
        </div>
      </div>
    </div>

    <!-- Face import modal -->
    <div id="face-import-modal" class="draw-modal">
      <div class="draw-modal-content" style="max-width:400px">
        <div class="draw-modal-header">
          <h3>导入五官素材</h3>
          <button class="draw-close-btn" id="face-modal-close">&times;</button>
        </div>
        <div class="draw-body" style="flex-direction:column;align-items:center;gap:16px;padding:20px">
          <div id="face-preview-area" class="face-preview-area">
            <p>点击选择图片</p>
          </div>
          <div class="draw-field" style="width:100%">
            <label>名称</label>
            <input type="text" id="face-import-name" class="draw-name-input" placeholder="五官名称" maxlength="10">
          </div>
          <div class="draw-field" style="width:100%">
            <label>分类</label>
            <div class="draw-category-btns">
              <button class="face-cat-btn active" data-cat="eyes">眼睛</button>
              <button class="face-cat-btn" data-cat="noses">鼻子</button>
              <button class="face-cat-btn" data-cat="mouths">嘴巴</button>
              <button class="face-cat-btn" data-cat="extras">其他</button>
            </div>
          </div>
        </div>
        <div class="draw-modal-footer">
          <button class="draw-cancel-btn" id="face-modal-cancel">取消</button>
          <button class="draw-save-btn" id="face-modal-save">导入</button>
        </div>
      </div>
    </div>

    <!-- Student grid -->
    <div id="student-section">
      <h2>学生作品</h2>
      <div id="student-grid"></div>
      <div id="empty-state" class="empty-state">
        <p>等待学生加入...</p>
      </div>
    </div>

    <!-- Zoom view overlay -->
    <div id="zoom-view">
      <div class="zoom-container">
        <button id="close-zoom" class="close-btn">&times;</button>
        <canvas id="zoom-canvas" width="500" height="500"></canvas>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/asset-loader.js"></script>
  <script src="js/canvas-utils.js"></script>
  <script src="js/draw-tool.js"></script>
  <script src="js/socket-client.js"></script>
  <script src="js/teacher.js"></script>
</body>
</html>
