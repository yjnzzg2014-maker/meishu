<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太阳装饰家 - 教师控制台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading -->
  <div id="loader" class="loader">
    <div class="loader-sun"></div>
    <p>加载中...</p>
  </div>

  <div id="teacher-app">
    <div class="teacher-header">
      <h1>太阳装饰家</h1>
      <span class="teacher-badge" aria-hidden="true">教师控制台</span>
    </div>

    <div id="control-bar" role="toolbar" aria-label="控制栏">
      <!-- Mode switcher -->
      <div class="control-group">
        <span id="mode-label" class="sr-only">当前模式</span>
        <div class="mode-buttons" role="group" aria-label="模式选择">
          <button class="mode-btn active" data-mode="symmetric" aria-pressed="true">对称装饰</button>
          <button class="mode-btn" data-mode="personify" aria-pressed="false">拟人化</button>
          <button class="mode-btn" data-mode="free" aria-pressed="false">自由模式</button>
        </div>
      </div>

      <!-- Student count -->
      <div class="control-group">
        <span id="connection-label" class="sr-only">连接状态</span>
        <div id="student-count" class="count-display" role="status" aria-live="polite" aria-atomic="true">0 位学生在线</div>
      </div>

      <!-- Lock -->
      <div class="control-group">
        <button id="btn-lock" class="lock-btn" aria-pressed="false">锁定操作</button>
      </div>

      <!-- Clear all -->
      <div class="control-group">
        <button id="btn-clear-all" class="action-btn danger has-tip" data-tip="断开所有学生连接并清空画板，学生将自动重新加入">清除全部</button>
      </div>

      <!-- Showcase controls -->
      <div class="control-group" id="showcase-group">
        <button id="btn-showcase" class="action-btn has-tip" disabled data-tip="将选中学生的作品全屏展示给所有人">展示</button>
        <button id="btn-stop-showcase" class="action-btn danger has-tip" hidden data-tip="结束当前展示，恢复正常视图">结束展示</button>
      </div>
      <!-- Gallery controls -->
      <div class="control-group" id="gallery-group">
        <button id="btn-gallery-select" class="action-btn has-tip" data-tip="勾选多位学生，然后开始展廊动画">选择展廊</button>
        <button id="btn-start-gallery" class="action-btn accent has-tip" hidden data-tip="在所有学生端播放星空悬挂画廊动画">开始展廊</button>
        <button id="btn-stop-gallery" class="action-btn danger has-tip" hidden data-tip="关闭所有学生端的展廊动画">结束展廊</button>
      </div>

    </div>

    <!-- Asset Management Section -->
    <div id="asset-section" class="teacher-section collapsed" role="region" aria-labelledby="asset-heading">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:8px">
          <h2 id="asset-heading">素材管理</h2>
          <button id="btn-collapse-assets" class="collapse-btn" aria-label="展开素材管理" aria-expanded="false" title="折叠/展开">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
        </div>
        <div class="section-actions">
          <button id="btn-draw-shape" class="action-btn">绘制素材</button>
          <button id="btn-import-shape" class="action-btn">导入点线</button>
          <button id="btn-import-face" class="action-btn accent">导入五官</button>
          <input type="file" id="face-file-input" accept="image/*" style="display:none" aria-hidden="true">
          <input type="file" id="shape-file-input" accept="image/*" style="display:none" aria-hidden="true">
        </div>
      </div>

      <!-- Custom shapes list -->
      <div id="custom-assets-area">
        <div class="asset-group">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <h3 style="margin:0">自定义素材 (点/线)</h3>
            <button id="btn-select-all-shapes" class="action-btn" style="padding:4px 12px;font-size:12px">全选</button>
            <button id="btn-delete-selected-shapes" class="action-btn accent" style="padding:4px 12px;font-size:12px" disabled>删除选中 (0)</button>
          </div>
          <div id="custom-shapes-grid" class="asset-grid" role="list" aria-label="自定义点线素材列表"></div>
          <p id="no-custom-shapes" class="empty-hint" role="status">暂无自定义素材，点击"绘制素材"添加</p>
        </div>
        <div class="asset-group">
          <h3>自定义五官</h3>
          <div id="custom-faces-grid" class="asset-grid" role="list" aria-label="自定义五官素材列表"></div>
          <p id="no-custom-faces" class="empty-hint" role="status">暂无自定义五官，点击"导入五官"添加</p>
        </div>
      </div>
    </div>

    <!-- Shape import modal -->
    <div id="shape-import-modal" class="draw-modal" role="dialog" aria-modal="true" aria-labelledby="shape-modal-title" hidden>
      <div class="draw-modal-content" style="max-width:400px">
        <div class="draw-modal-header">
          <h3 id="shape-modal-title">导入点线素材</h3>
          <button class="draw-close-btn" id="shape-modal-close" aria-label="关闭">&times;</button>
        </div>
        <div class="draw-body" style="flex-direction:column;align-items:center;gap:16px;padding:20px">
          <div id="shape-preview-area" class="face-preview-area" aria-live="polite">
            <p>点击选择图片</p>
          </div>
          <div class="draw-field" style="width:100%">
            <label for="shape-import-name">名称</label>
            <input type="text" id="shape-import-name" class="draw-name-input" placeholder="素材名称" maxlength="10">
          </div>
          <div class="draw-field" style="width:100%">
            <span id="shape-cat-label" class="sr-only">分类</span>
            <div class="draw-category-btns" role="group" aria-labelledby="shape-cat-label">
              <button class="shape-cat-btn active" data-cat="dots" aria-pressed="true">点</button>
              <button class="shape-cat-btn" data-cat="lines" aria-pressed="false">线</button>
            </div>
          </div>
        </div>
        <div class="draw-modal-footer">
          <button class="draw-cancel-btn" id="shape-modal-cancel">取消</button>
          <button class="draw-save-btn" id="shape-modal-save">导入</button>
        </div>
      </div>
    </div>

    <!-- Face import modal -->
    <div id="face-import-modal" class="draw-modal" role="dialog" aria-modal="true" aria-labelledby="face-modal-title" hidden>
      <div class="draw-modal-content" style="max-width:400px">
        <div class="draw-modal-header">
          <h3 id="face-modal-title">导入五官素材</h3>
          <button class="draw-close-btn" id="face-modal-close" aria-label="关闭">&times;</button>
        </div>
        <div class="draw-body" style="flex-direction:column;align-items:center;gap:16px;padding:20px">
          <div id="face-preview-area" class="face-preview-area" aria-live="polite">
            <p>点击选择图片</p>
          </div>
          <div class="draw-field" style="width:100%">
            <label for="face-import-name">名称</label>
            <input type="text" id="face-import-name" class="draw-name-input" placeholder="五官名称" maxlength="10">
          </div>
          <div class="draw-field" style="width:100%">
            <span id="face-cat-label" class="sr-only">分类</span>
            <div class="draw-category-btns" role="group" aria-labelledby="face-cat-label">
              <button class="face-cat-btn active" data-cat="eyes" aria-pressed="true">眼睛</button>
              <button class="face-cat-btn" data-cat="noses" aria-pressed="false">鼻子</button>
              <button class="face-cat-btn" data-cat="mouths" aria-pressed="false">嘴巴</button>
              <button class="face-cat-btn" data-cat="extras" aria-pressed="false">其他</button>
            </div>
          </div>
        </div>
        <div class="draw-modal-footer">
          <button class="draw-cancel-btn" id="face-modal-cancel">取消</button>
          <button class="draw-save-btn" id="face-modal-save">导入</button>
        </div>
      </div>
    </div>

    <!-- Student grid -->
    <div id="student-section" role="region" aria-labelledby="students-heading">
      <h2 id="students-heading">学生作品</h2>
      <div id="student-grid" role="list" aria-label="学生作品列表" aria-live="polite"></div>
      <div id="empty-state" class="empty-state" role="status">
        <p>等待学生加入...</p>
      </div>
    </div>

    <!-- Showcase mode dialog -->
    <div id="showcase-dialog" class="draw-modal" role="dialog" aria-modal="true" hidden>
      <div class="draw-modal-content" style="max-width:300px">
        <div class="draw-modal-header">
          <h3>展示方式</h3>
          <button class="draw-close-btn" id="showcase-dialog-close" aria-label="关闭">&times;</button>
        </div>
        <div class="draw-body" style="flex-direction:column;gap:12px;padding:20px">
          <button id="btn-showcase-frozen" class="action-btn" style="width:100%">冻结画布展示</button>
          <button id="btn-showcase-live" class="action-btn accent" style="width:100%">实时展示</button>
        </div>
      </div>
    </div>

    <!-- Zoom view overlay -->
    <div id="zoom-view" role="dialog" aria-modal="true" aria-labelledby="zoom-title" hidden>
      <div class="zoom-container">
        <button id="close-zoom" class="close-btn" aria-label="关闭放大视图">&times;</button>
        <canvas id="zoom-canvas" width="500" height="500" aria-label="学生作品放大视图"></canvas>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/asset-loader.js"></script>
  <script src="js/canvas-utils.js"></script>
  <script src="js/draw-tool.js"></script>
  <script src="js/socket-client.js"></script>
  <script src="js/teacher.js"></script>
</body>
</html>
