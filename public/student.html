<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>太阳装饰家</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading screen -->
  <div id="loader" class="loader">
    <div class="loader-sun"></div>
    <p>正在准备画笔...</p>
  </div>

  <div id="app">
    <!-- Header -->
    <div id="header">
      <span id="mode-label">对称装饰模式</span>
    </div>

    <!-- Shape panel (left side) - symmetric/free modes -->
    <div id="shape-panel" class="side-panel visible">
      <div class="panel-header">素材</div>
      <div class="category-tabs">
        <button class="category-tab active" data-category="dots">点</button>
        <button class="category-tab" data-category="lines">线</button>
      </div>
      <div id="shape-items" class="panel-grid"></div>
    </div>

    <!-- Face panel (right side) - personify/free modes -->
    <div id="face-panel" class="side-panel right">
      <div class="panel-header">五官</div>
    </div>

    <!-- Canvas area -->
    <div id="canvas-container">
      <canvas id="main-canvas"></canvas>
    </div>

    <!-- Color palette bar -->
    <div id="color-bar" class="visible">
      <div class="color-bar-label">调色</div>
      <div id="color-palette"></div>
    </div>

    <!-- Sun skin selector (bottom) -->
    <div id="skin-bar">
      <div class="skin-bar-label">太阳皮肤</div>
      <div id="skin-selector"></div>
    </div>

    <!-- Bottom toolbar -->
    <div id="toolbar">
      <button id="btn-undo" class="tool-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10h13a4 4 0 0 1 0 8H7"/><path d="M3 10l4-4"/><path d="M3 10l4 4"/></svg>
        <span>撤销</span>
      </button>
      <button id="btn-clear" class="tool-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6"/></svg>
        <span>清空</span>
      </button>
    </div>

    <!-- Lock overlay -->
    <div id="lock-overlay">
      <div class="lock-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <p>老师暂停了操作</p>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/asset-loader.js"></script>
  <script src="js/canvas-utils.js"></script>
  <script src="js/face-mode.js"></script>
  <script src="js/socket-client.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
