<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>太阳装饰家</title>
  <link rel="stylesheet" href="https://meishu-1776574046152.oss-cn-hangzhou.aliyuncs.com/meishu/css/style.css">
</head>
<body>
  <!-- Loading screen -->
  <div id="loader" class="loader" style="background-image: url('https://meishu-1776574046152.oss-cn-hangzhou.aliyuncs.com/meishu/images/classroom_bg.png'); background-size: cover; background-position: center;">
    <div class="loader-content">
      <div class="loader-sun"></div>
      <p class="loader-text">正在准备画笔...</p>
      <button id="btn-start" class="start-btn" hidden>开始制造太阳</button>
    </div>
  </div>

  <!-- Exit fullscreen button -->
  <button id="btn-exit-fullscreen" class="exit-fullscreen-btn" hidden title="退出全屏">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
  </button>

  <div id="app">
    <!-- ① 浮动模式胶囊（替代 #header） -->
    <div id="mode-capsule" role="status" aria-live="polite" aria-atomic="true">
      <span id="student-fruit-name" class="capsule-fruit" hidden></span>
      <span class="capsule-sep" hidden>·</span>
      <span id="mode-label">装饰模式</span>
    </div>

    <!-- Shape panel (left side) - symmetric/free modes -->
    <div id="shape-panel" class="side-panel visible" role="region" aria-label="素材面板">
      <div class="panel-header">素材</div>
      <div class="category-tabs" role="tablist" aria-label="素材分类">
        <button class="category-tab active" data-category="dots" role="tab" aria-selected="true" tabindex="0">点</button>
        <button class="category-tab" data-category="lines" role="tab" aria-selected="false" tabindex="-1">线</button>
      </div>
      <div id="shape-items" class="panel-grid" role="tabpanel" aria-label="素材列表"></div>
      <!-- 皮肤栏内嵌于素材面板底部 -->
      <div id="skin-bar-inline">
        <div class="skin-bar-label">太阳皮肤</div>
        <div id="skin-selector"></div>
      </div>
    </div>

    <!-- Face panel (left side) - personify mode -->
    <div id="face-panel" class="side-panel" role="region" aria-label="五官面板">
      <div class="panel-header">五官</div>
    </div>

    <!-- Color panel (right side) - 装饰模式 -->
    <div id="color-panel" class="side-panel right" role="region" aria-label="调色盘">
      <div class="panel-header">颜色</div>
      <div id="color-rainbow-list" class="panel-grid color-list" role="listbox" aria-label="颜色选择"></div>
    </div>

    <!-- Canvas area -->
    <div id="canvas-container">
      <div id="breathing-wrapper">
        <canvas id="main-canvas" role="img" aria-label="绘画画布"></canvas>
      </div>
      <!-- 重叠选择指示器 -->
      <div id="overlap-indicator" aria-live="polite" hidden>
        <span id="overlap-counter">1/3</span>
      </div>
    </div>

    <!-- ② 画布浮动操作栏（替代 #toolbar） -->
    <div id="canvas-toolbar" role="toolbar" aria-label="画布操作">
      <button id="btn-undo" class="canvas-tool-btn" aria-label="撤销">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10h13a4 4 0 0 1 0 8H7"/><path d="M3 10l4-4"/><path d="M3 10l4 4"/></svg>
        <span>撤销</span>
      </button>
      <div class="canvas-toolbar-divider"></div>
      <button id="btn-copy" class="canvas-tool-btn selection-only" aria-label="复制" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span>复制</span>
      </button>
      <button id="btn-layer-up" class="canvas-tool-btn selection-only" aria-label="上移一层" disabled title="上移一层">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
        <span>上移</span>
      </button>
      <button id="btn-layer-down" class="canvas-tool-btn selection-only" aria-label="下移一层" disabled title="下移一层">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="M19 12l-7 7-7-7"/></svg>
        <span>下移</span>
      </button>
      <button id="btn-delete" class="canvas-tool-btn selection-only danger" aria-label="删除" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6"/></svg>
        <span>删除</span>
      </button>
      <div class="canvas-toolbar-divider"></div>
      <button id="btn-clear" class="canvas-tool-btn" aria-label="清空">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        <span>清空</span>
      </button>
    </div>

    <!-- Lock overlay -->
    <div id="lock-overlay" role="alertdialog" aria-modal="true" aria-labelledby="lock-message" hidden>
      <div class="lock-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <p id="lock-message">老师暂停了操作</p>
    </div>

    <!-- Showcase self-notice banner -->
    <div id="showcase-self-notice" hidden role="status" aria-live="polite">
      <span class="showcase-notice-icon">🎨</span>
      <span>正在展示你的作品，请继续操作</span>
    </div>

    <!-- Reconnect overlay -->
    <div id="reconnect-overlay" role="alertdialog" aria-modal="true" aria-labelledby="reconnect-message" hidden>
      <div class="reconnect-content">
        <div class="reconnect-spinner"></div>
        <p id="reconnect-message">断线重连中...</p>
      </div>
    </div>

    <!-- Showcase overlay -->
    <div id="showcase-overlay" hidden>
      <div class="showcase-header">
        <span id="showcase-fruit-name"></span>
        <span class="showcase-badge">正在展示</span>
      </div>
      <canvas id="showcase-canvas"></canvas>
    </div>

    <!-- Gallery overlay -->
    <div id="gallery-overlay" hidden>
      <canvas id="gallery-canvas"></canvas>
    </div>

  </div>

  <script>window.ASSET_BASE_URL='https://meishu-1776574046152.oss-cn-hangzhou.aliyuncs.com/meishu/';</script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://meishu-1776574046152.oss-cn-hangzhou.aliyuncs.com/meishu/js/bundle-student.js"></script>
</body>
</html>
